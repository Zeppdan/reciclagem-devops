name: CI/CD Reciclagem App

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Dar permissão ao Maven Wrapper
        run: chmod +x mvnw

      - name: Executar build e testes
        run: ./mvnw clean verify

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir imagem Docker
        run: docker build -t reciclagem-app:${{ github.sha }} .

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Simular deploy em staging
        run: |
          echo "Iniciando deploy no ambiente de staging..."
          echo "Build da aplicação validada com sucesso."
          echo "Imagem Docker gerada com sucesso."
          echo "Deploy em staging concluído."

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Simular deploy em produção
        run: |
          echo "Iniciando deploy no ambiente de produção..."
          echo "Build da aplicação validada com sucesso."
          echo "Imagem Docker gerada com sucesso."
          echo "Deploy em produção concluído."